<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    body { width: 320px; max-height: 560px; overflow-y: auto; margin: 0; padding: 14px 16px; font-family: arial, sans-serif; color: #202124; }
    h1 { font-size: 15px; margin: 0 0 4px; color: #1a73e8; }
    h2 { font-size: 13px; margin: 0; color: #202124; }
    p.sub { font-size: 12px; color: #5f6368; margin: 0 0 14px; }
    label { display: block; font-size: 12px; font-weight: 600; margin: 12px 0 4px; }
    select, textarea, input[type=text] { width: 100%; padding: 6px; border-radius: 6px; border: 1px solid #dadce0; font-size: 13px; box-sizing: border-box; font-family: inherit; }
    textarea { resize: vertical; min-height: 46px; }
    .hint { font-size: 11px; color: #5f6368; margin: 3px 0 0; }
    .row { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 13px; }
    .head { display: flex; align-items: center; justify-content: space-between; margin: 14px 0 6px; }
    #searxngWrap { display: none; }
    #saved { font-size: 12px; color: #188038; margin-top: 12px; min-height: 14px; }
    .engines { font-size: 11px; color: #5f6368; margin-top: 12px; line-height: 1.4; }
    hr { border: none; border-top: 1px solid #eee; margin: 14px 0 0; }
    .mini { font-size: 11px; padding: 3px 8px; border: 1px solid #dadce0; background: #fff; border-radius: 10px; cursor: pointer; }
    .mini:hover { background: #f1f3f4; }
    .gem { border-bottom: 1px solid #f1f3f4; padding: 7px 0; display: flex; gap: 6px; align-items: flex-start; }
    .gem a { font-size: 12px; color: #1a0dab; text-decoration: none; display: block; line-height: 1.3; }
    .gem a:hover { text-decoration: underline; }
    .gem .meta { font-size: 10px; color: #5f6368; margin-top: 2px; word-break: break-all; }
    .gem .del { border: none; background: none; color: #c5221f; cursor: pointer; font-size: 13px; padding: 0 2px; }
    .empty { font-size: 11px; color: #5f6368; font-style: italic; padding: 6px 0; }
    .vgroup { margin-bottom: 8px; }
    .vtitle { font-size: 11px; font-weight: 700; margin-bottom: 3px; }
    .vtitle.vup { color: #188038; }
    .vtitle.vdown { color: #c5221f; }
    .vrow { display: flex; align-items: center; justify-content: space-between; font-size: 12px; padding: 3px 0; border-bottom: 1px solid #f5f5f5; }
    .vrow span { word-break: break-all; }
  </style>
</head>
<body>
  <h1>PeRank</h1>
  <p class="sub" data-i18n="popupSubtitle"></p>

  <label for="lang" data-i18n="popupLanguage"></label>
  <select id="lang">
    <option value="auto" data-i18n="langAuto"></option>
    <option value="it">Italiano</option>
    <option value="en">English</option>
  </select>

  <label for="defaultMode" data-i18n="popupDefaultOrder"></label>
  <select id="defaultMode">
    <option value="originale" data-i18n="modeOriginal"></option>
    <option value="inverti" data-i18n="modeInvert"></option>
    <option value="pertinenza" data-i18n="modeRelevance"></option>
  </select>

  <label for="deepEngine" data-i18n="popupDeepEngine"></label>
  <select id="deepEngine">
    <option value="duckduckgo" data-i18n="optDdg"></option>
    <option value="brave" data-i18n="optBrave"></option>
    <option value="searxng" data-i18n="optSearxng"></option>
  </select>

  <div id="searxngWrap">
    <label for="searxngBase" data-i18n="popupSearxngLabel"></label>
    <input id="searxngBase" type="text" placeholder="https://searx.be">
  </div>

  <div class="row">
    <input type="checkbox" id="ignoreStopwords">
    <label for="ignoreStopwords" style="margin:0;font-weight:400;" data-i18n="popupIgnoreStopwords"></label>
  </div>

  <hr>

  <label for="blacklist" data-i18n="popupBlacklistLabel"></label>
  <textarea id="blacklist" placeholder="pinterest.com&#10;example.com"></textarea>
  <p class="hint" data-i18n="popupBlacklistHint"></p>

  <label for="whitelist" data-i18n="popupWhitelistLabel"></label>
  <textarea id="whitelist" placeholder="reddit.com&#10;wikipedia.org"></textarea>
  <p class="hint" data-i18n="popupWhitelistHint"></p>

  <hr>

  <div class="head">
    <h2 data-i18n="popupVotesTitle"></h2>
    <button id="resetVotes" class="mini" data-i18n="popupResetAll"></button>
  </div>

  <div class="vgroup">
    <div class="vtitle vup" data-i18n="popupPromoted"></div>
    <div id="votesUp"></div>
  </div>
  <div class="vgroup">
    <div class="vtitle vdown" data-i18n="popupDemoted"></div>
    <div id="votesDown"></div>
  </div>
  <p class="hint" data-i18n="popupVotesHint"></p>

  <div class="head">
    <h2 data-i18n="popupGemsTitle"></h2>
    <button id="clearGems" class="mini" data-i18n="popupClear"></button>
  </div>
  <div id="gemsList"></div>

  <div id="saved"></div>

  <div class="engines" data-i18n="popupEnginesList"></div>

  <script src="i18n-data.js"></script>
  <script src="popup.js"></script>
</body>
</html>
